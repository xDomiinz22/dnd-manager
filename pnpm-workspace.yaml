packages:
  - "web"
  - "shared"
overrides:
  # CVE de bounds-check en buf (v3/v5/v6); llega vía google-auth-library ->
  # gaxios, que solo usa uuid.v4() sin `buf` — riesgo real bajo, pero se fija
  # a la versión parcheada de todos modos.
  uuid@<11.1.1: ">=11.1.1"
allowBuilds:
  # Su postinstall es un prompt interactivo que copia assets a /public/assets
  # relativo al cwd de instalación — en este monorepo apuntaría al sitio
  # equivocado. Los assets (tema "default" + ammo.wasm) se copian a mano a
  # web/public/assets/dice-box/ y se versionan en el repo en su lugar.
  '@3d-dice/dice-box': false
  '@prisma/client': true
  '@prisma/engines': true
  argon2: true
  esbuild: true
  prisma: true
