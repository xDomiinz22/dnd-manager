<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="D&amp;D Manager">
  <!-- Sello: silueta de dado de 20 caras (d20), motivo más reconocible de D&D -->
  <polygon
    points="32,3 57.2,17.5 57.2,46.5 32,61 6.8,46.5 6.8,17.5"
    fill="#6B1620"
    stroke="#A8792B"
    stroke-width="2.5"
  />
  <!-- Líneas de faceta hacia el centro, sugiriendo el volumen del dado -->
  <g stroke="#8B2430" stroke-width="1" opacity="0.55">
    <line x1="32" y1="32" x2="32" y2="3" />
    <line x1="32" y1="32" x2="57.2" y2="17.5" />
    <line x1="32" y1="32" x2="57.2" y2="46.5" />
    <line x1="32" y1="32" x2="32" y2="61" />
    <line x1="32" y1="32" x2="6.8" y2="46.5" />
    <line x1="32" y1="32" x2="6.8" y2="17.5" />
  </g>
  <!-- Tomo abierto en el centro: el "Manager" del tomo del jugador -->
  <g fill="#F0E4C8">
    <path d="M32 23 C 27 20, 19 19, 15.5 21.5 L 15.5 40 C 19 37.5, 27 38.5, 32 42 Z" />
    <path d="M32 23 C 37 20, 45 19, 48.5 21.5 L 48.5 40 C 45 37.5, 37 38.5, 32 42 Z" />
  </g>
  <line x1="32" y1="23" x2="32" y2="42" stroke="#A8792B" stroke-width="1.3" />
</svg>
